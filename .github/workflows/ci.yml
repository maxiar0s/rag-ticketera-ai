name: RAG Agent CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx  # Herramientas de test

      - name: Lint with Flake8 (Calidad de Código)
        run: |
          pip install flake8
          # detiene el build si hay errores de sintaxis o variables no usadas
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test con Pytest (Opcional por ahora)
        run: |
          # pytest # Descomentar cuando tengamos tests
          echo "Tests passed (Mock)"
